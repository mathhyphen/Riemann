project:
  name: riemann
  version: 0.1.0

llm:
  provider: anthropic  # or openai
  model: claude-3-5-sonnet-20241022
  temperature: 0.7
  max_tokens: 4096

lean:
  provider: mathhammer  # or local
  timeout: 30
  max_retries: 3

agent:
  max_iterations: 10
  timeout_seconds: 60

logging:
  level: INFO
