# LLM Configuration - MiniMax
# Provider: minimax

provider: minimax

model: MiniMax-M2.7-highspeed
temperature: 0.7
max_tokens: 4096

# API settings (can be overridden by environment variables)
api_key: ${env:MINIMAX_API_KEY}
api_endpoint: ${env:MINIMAX_BASE_URL,https://api.minimaxi.com/anthropic}
