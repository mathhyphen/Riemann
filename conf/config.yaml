# Riemann Configuration
# This is the main configuration file for the Riemann proof assistant

defaults:
  - _self_
  - llm: anthropic
  - lean: http
  - agent: default

# Project name
project_name: riemann

# Logging
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

# Output directory
output_dir: ./outputs

# Experiment settings
experiment:
  name: ${now:%Y-%m-%d_%H-%M-%S}
  seed: 42
